<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Together We Go — 2 Player Co-op</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 900, H = 560;
C.width = W; C.height = H;

function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  C.style.width = (W * scale) + 'px';
  C.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── AUDIO ────────────────────────────────────────────────
let AC = null;
function getAC() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; }
function tone(f, t, type = 'square', vol = 0.2, f2 = null) {
  try {
    const ac = getAC(), o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.setValueAtTime(f, ac.currentTime);
    if (f2 !== null) o.frequency.exponentialRampToValueAtTime(f2, ac.currentTime + t);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t);
    o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + t);
  } catch(e) {}
}
const jumpSfx = () => tone(380, 0.12, 'square', 0.18, 560);
const coinSfx = () => { tone(880, 0.08, 'sine', 0.2); tone(1100, 0.08, 'sine', 0.2, 1500); };
const stepSfx = () => tone(220, 0.06, 'square', 0.12, 110);
const unlockSfx = () => { tone(440, 0.15, 'sine', 0.3, 660); tone(660, 0.15, 'sine', 0.3, 880); tone(880, 0.25, 'sine', 0.3); };
const winSfx = () => [523,659,784,1047].forEach((f,i) => setTimeout(() => tone(f, 0.35, 'sine', 0.3), i*160));
const loseSfx = () => tone(200, 0.4, 'sawtooth', 0.2, 80);
const syncSfx = () => { tone(600, 0.1, 'sine', 0.25); tone(900, 0.15, 'sine', 0.3); };
const selectSfx = () => tone(660, 0.1, 'sine', 0.2, 880);
const pickSfx = () => { tone(880, 0.08, 'sine', 0.3); tone(1100, 0.1, 'sine', 0.25, 1400); };

// ─── CHARACTER DEFINITIONS ─────────────────────────────────
const CHARACTERS = [
  { id: 'knight',  name: 'Knight',  color: '#c0c0c0', hatColor: '#888899', skin: '#f5c89a', legColor: '#cc3333', hatType: 'helmet' },
  { id: 'mage',     name: 'Mage',    color: '#9955dd', hatColor: '#7733bb', skin: '#f5c89a', legColor: '#7733bb', hatType: 'wizard' },
  { id: 'ninja',    name: 'Ninja',   color: '#222233', hatColor: '#111122', skin: '#f5c89a', legColor: '#3366cc', hatType: 'ninja' },
  { id: 'robot',    name: 'Robot',   color: '#44aaff', hatColor: '#3388cc', skin: '#c0c0c0', legColor: '#3388cc', hatType: 'antenna' },
  { id: 'viking',   name: 'Viking',  color: '#aa6633', hatColor: '#885522', skin: '#f5c89a', legColor: '#cc3333', hatType: 'horns' },
  { id: 'pirate',   name: 'Pirate',  color: '#e84040', hatColor: '#cc2222', skin: '#f5c89a', legColor: '#3366cc', hatType: 'bandana' },
  { id: 'elf',      name: 'Elf',     color: '#44cc66', hatColor: '#338844', skin: '#ffeedd', legColor: '#338844', hatType: 'ears' },
  { id: 'alien',    name: 'Alien',   color: '#88ee44', hatColor: '#66cc33', skin: '#88ee44', legColor: '#66cc33', hatType: 'alien' },
];

// Draw character at (cx, cy) center, scale, facing, bobOffset, showLabel
function drawCharacter(charDef, cx, cy, scale, isP1, bobOffset, facing, showLabel) {
  ctx.save();
  ctx.translate(cx, cy);
  const s = scale;
  facing = facing || 1;

  // glow
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 50*s);
  g.addColorStop(0, charDef.color + '33'); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, 50*s, 0, Math.PI*2); ctx.fill();

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0, 18*s, 13*s, 5*s, 0, 0, Math.PI*2); ctx.fill();

  const bob = bobOffset || 0;

  // headgear (hatType)
  const hType = charDef.hatType;
  if (hType === 'helmet') {
    ctx.fillStyle = charDef.hatColor;
    ctx.fillRect(-11*s, -25*s+bob, 22*s, 9*s);
    ctx.fillRect(-7*s, -31*s+bob, 14*s, 7*s);
    ctx.fillStyle = '#333'; ctx.fillRect(-7*s, -22*s+bob, 14*s, 4*s);
  } else if (hType === 'wizard') {
    ctx.fillStyle = charDef.hatColor;
    ctx.beginPath();
    ctx.moveTo(0, -52*s+bob); ctx.lineTo(-13*s, -21*s+bob); ctx.lineTo(13*s, -21*s+bob); ctx.fill();
    ctx.fillRect(-15*s, -23*s+bob, 30*s, 4*s);
    ctx.fillStyle = '#ffdd00'; ctx.font = `${9*s}px Arial`; ctx.textAlign = 'center';
    ctx.fillText('★', 0, -36*s+bob);
  } else if (hType === 'ninja') {
    ctx.fillStyle = charDef.hatColor; ctx.fillRect(-11*s, -27*s+bob, 22*s, 8*s);
    ctx.fillStyle = '#fff'; ctx.fillRect(-9*s, -24*s+bob, 18*s, 3*s);
  } else if (hType === 'antenna') {
    ctx.strokeStyle = charDef.hatColor; ctx.lineWidth = 2*s;
    ctx.beginPath(); ctx.moveTo(-4*s,-25*s+bob); ctx.lineTo(-4*s,-36*s+bob);
    ctx.moveTo(4*s,-25*s+bob); ctx.lineTo(4*s,-36*s+bob); ctx.stroke();
    ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(-4*s,-38*s+bob, 3*s, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#44ff44'; ctx.beginPath(); ctx.arc(4*s,-38*s+bob, 3*s, 0, Math.PI*2); ctx.fill();
  } else if (hType === 'horns') {
    ctx.fillStyle = '#f5f5f0';
    ctx.beginPath(); ctx.moveTo(-9*s,-25*s+bob); ctx.lineTo(-13*s,-40*s+bob); ctx.lineTo(-5*s,-25*s+bob); ctx.fill();
    ctx.beginPath(); ctx.moveTo(9*s,-25*s+bob); ctx.lineTo(13*s,-40*s+bob); ctx.lineTo(5*s,-25*s+bob); ctx.fill();
  } else if (hType === 'bandana') {
    ctx.fillStyle = charDef.hatColor;
    ctx.fillRect(-11*s,-27*s+bob, 22*s, 8*s); ctx.fillRect(-11*s,-21*s+bob, 22*s, 3*s);
  } else if (hType === 'ears') {
    ctx.fillStyle = charDef.skin;
    ctx.beginPath(); ctx.moveTo(-11*s,-17*s+bob); ctx.lineTo(-19*s,-25*s+bob); ctx.lineTo(-7*s,-15*s+bob); ctx.fill();
    ctx.beginPath(); ctx.moveTo(11*s,-17*s+bob); ctx.lineTo(19*s,-25*s+bob); ctx.lineTo(7*s,-15*s+bob); ctx.fill();
  } else if (hType === 'alien') {
    ctx.fillStyle = charDef.skin;
    ctx.beginPath(); ctx.ellipse(0, -11*s+bob, 15*s, 11*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(-6*s,-13*s+bob, 5*s, 4*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6*s,-13*s+bob, 5*s, 4*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.ellipse(-6*s,-13*s+bob, 2.5*s, 2.5*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6*s,-13*s+bob, 2.5*s, 2.5*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore(); return;
  }

  // head
  ctx.fillStyle = charDef.skin;
  ctx.beginPath(); ctx.roundRect ? ctx.roundRect(-9*s, -24*s+bob, 18*s, 13*s, 4*s) : (ctx.rect(-9*s,-24*s+bob,18*s,13*s), ctx.fill());
  // eyes
  ctx.fillStyle = '#333';
  const eyeOff = facing > 0 ? 1.5 : -1.5;
  ctx.beginPath(); ctx.arc(-3.5*s+eyeOff, -20*s+bob, 2.2*s, 0, Math.PI*2); ctx.arc(3.5*s+eyeOff, -20*s+bob, 2.2*s, 0, Math.PI*2); ctx.fill();

  // legs
  ctx.fillStyle = charDef.legColor;
  ctx.fillRect(-8*s, 4*s+bob, 7*s, 13*s); ctx.fillRect(1*s, 4*s+bob, 7*s, 13*s);

  // body
  ctx.fillStyle = charDef.color;
  ctx.beginPath(); ctx.roundRect ? ctx.roundRect(-10*s,-11*s+bob, 20*s, 18*s, 4*s) : (ctx.rect(-10*s,-11*s+bob,20*s,18*s), ctx.fill());

  // arm
  ctx.fillStyle = charDef.color;
  ctx.save(); ctx.translate(facing > 0 ? 10*s : -10*s, -7*s+bob);
  ctx.rotate(Math.sin(Date.now()*0.015)*0.3);
  ctx.fillRect(-2*s, 0, 4*s, 11*s); ctx.restore();

  // label
  if (showLabel) {
    ctx.fillStyle = charDef.color; ctx.font = `bold 11px Arial`; ctx.textAlign = 'center';
    ctx.fillText(isP1 ? 'P1' : 'P2', 0, -38*s+bob);
  }
  ctx.restore();
}

// Draw character in selection grid
function drawCharCard(charDef, cx, cy, size, selected, playerNum) {
  const borderColor = playerNum === 1 ? '#e84040' : '#4488ff';
  const glowColor = borderColor;
  const pulse = selected ? (0.7 + Math.sin(Date.now()*0.01)*0.3) : 1;
  if (selected) {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, size*1.5);
    g.addColorStop(0, glowColor+'55'); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, size*1.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = selected ? '#1e1e36' : '#111122';
  ctx.beginPath(); ctx.roundRect ? ctx.roundRect(cx-size, cy-size, size*2, size*2, 14) : (ctx.rect(cx-size,cy-size,size*2,size*2), ctx.fill());
  ctx.strokeStyle = selected ? borderColor : '#333'; ctx.lineWidth = selected ? 3 : 1.5;
  ctx.beginPath(); ctx.roundRect ? ctx.roundRect(cx-size, cy-size, size*2, size*2, 14) : (ctx.rect(cx-size,cy-size,size*2,size*2), ctx.stroke(), ctx.fill());
  drawCharacter(charDef, cx, cy+4, size/55*pulse, playerNum===1, 0, 1, false);
  ctx.fillStyle = selected ? borderColor : '#777'; ctx.font = `bold 11px Arial`; ctx.textAlign = 'center';
  ctx.fillText(charDef.name, cx, cy+size-8);
  if (selected) {
    ctx.fillStyle = borderColor; ctx.font = `bold 14px Arial`; ctx.textAlign = 'center';
    ctx.fillText('✓', cx, cy+size-22);
  }
}

// ─── PHYSICS ──────────────────────────────────────────────
const GRAV = 0.55, JUMP = -13, SPD = 4.2;

// ─── INPUT ────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { if (!keys[e.code]) { keys[e.code] = true; onKeyDown(e.code); } e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

let gs = 'charSelect'; // charSelect | menu | playing | levelComplete | gameWin
let charPhase = 0; // 0=P1, 1=P2
let pickP1 = 0, pickP2 = 0;
let p1Char = CHARACTERS[0], p2Char = CHARACTERS[1];
let lvlIdx = 0, p1, p2, lvl, lockRef;
let syncProgress = 0;
let menuAnimT = 0;

function onKeyDown(code) {
  const NC = CHARACTERS.length;
  if (gs === 'charSelect') {
    if (charPhase === 0) {
      if (code==='ArrowRight'||code==='KeyD') { pickP1=(pickP1+1)%NC; pickSfx(); }
      if (code==='ArrowLeft'||code==='KeyA')  { pickP1=(pickP1-1+NC)%NC; pickSfx(); }
      if (code==='ArrowDown'||code==='KeyS')  { pickP1=(pickP1+4)%NC; pickSfx(); }
      if (code==='ArrowUp'  ||code==='KeyW')  { pickP1=(pickP1-4+NC)%NC; pickSfx(); }
      if (code==='Enter'||code==='Space') { pickSfx(); charPhase=1; }
    } else {
      if (code==='ArrowRight') { pickP2=(pickP2+1)%NC; pickSfx(); }
      if (code==='ArrowLeft')  { pickP2=(pickP2-1+NC)%NC; pickSfx(); }
      if (code==='ArrowDown')  { pickP2=(pickP2+4)%NC; pickSfx(); }
      if (code==='ArrowUp')    { pickP2=(pickP2-4+NC)%NC; pickSfx(); }
      if (code==='Enter'||code==='Space') {
        pickSfx(); p1Char=CHARACTERS[pickP1]; p2Char=CHARACTERS[pickP2]; gs='menu';
      }
    }
    return;
  }
  if (code==='Enter'||code==='Space') {
    selectSfx();
    if (gs==='menu') { gs='playing'; initLevel(0); }
    else if (gs==='levelComplete') {
      if (lvlIdx<LEVELS.length-1) { lvlIdx++; initLevel(lvlIdx); gs='playing'; }
      else gs='gameWin';
    } else if (gs==='gameWin') { gs='charSelect'; charPhase=0; pickP1=0; pickP2=0; }
  }
  if (code==='KeyR'&&gs==='playing') initLevel(lvlIdx);
}

// ─── PARTICLES ────────────────────────────────────────────
const parts = [];
function spawnPart(x,y,color,n=8) {
  for (let i=0;i<n;i++){const a=(Math.PI*2*i)/n+Math.random()*0.5,spd=1.5+Math.random()*2.5;
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,life:1,decay:0.03+Math.random()*0.02,r:3+Math.random()*3,color});}
}
function updateParts() {
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;if(p.life<=0)parts.splice(i,1);}
}
function drawParts(){parts.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}

// ─── ROUND RECT polyfill ───────────────────────────────────
function rRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();}
function sRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.stroke();}

// ─── GAME OBJECTS ─────────────────────────────────────────
class Platform {
  constructor(x,y,w,h,style='grass'){this.x=x;this.y=y;this.w=w;this.h=h;this.style=style;}
  draw(){
    const g=ctx.createLinearGradient(this.x,this.y,this.x,this.y+this.h);
    if(this.style==='stone'){g.addColorStop(0,'#8a8a8a');g.addColorStop(1,'#5a5a5a');ctx.fillStyle=g;ctx.fillRect(this.x,this.y,this.w,this.h);ctx.strokeStyle='#444';ctx.lineWidth=1;for(let i=0;i<this.w;i+=40){ctx.beginPath();ctx.moveTo(this.x+i,this.y);ctx.lineTo(this.x+i,this.y+this.h);ctx.stroke();}}
    else if(this.style==='wood'){g.addColorStop(0,'#a0724a');g.addColorStop(1,'#7a5230');ctx.fillStyle=g;ctx.fillRect(this.x,this.y,this.w,this.h);ctx.strokeStyle='#5a3a1a';for(let i=0;i<this.w;i+=30){ctx.beginPath();ctx.moveTo(this.x+i,this.y);ctx.lineTo(this.x+i,this.y+this.h);ctx.stroke();}}
    else{g.addColorStop(0,'#4a8c3f');g.addColorStop(0.15,'#3a7028');g.addColorStop(1,'#2a5018');ctx.fillStyle=g;ctx.fillRect(this.x,this.y,this.w,this.h);ctx.fillStyle='#5aaa48';ctx.fillRect(this.x,this.y,this.w,6);ctx.fillStyle='#6acc58';for(let i=8;i<this.w;i+=16)ctx.fillRect(this.x+i,this.y,4,4);}
  }
}

class Plate {
  constructor(x,y,w,color,links=[]){this.x=x;this.y=y;this.w=w;this.h=18;this.color=color;this.links=links;this.who=null;}
  draw(){
    const pr=this.who!==null;
    ctx.fillStyle='#555';rRect(this.x,this.y,this.w,this.h,6);
    ctx.fillStyle=pr?this.color:'#777';rRect(this.x+4,this.y+(pr?10:3),this.w-8,pr?5:12,4);
    if(pr){ctx.fillStyle=this.color+'55';ctx.beginPath();ctx.arc(this.x+this.w/2,this.y+4,12,0,Math.PI*2);ctx.fill();ctx.fillStyle=this.color;ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.fillText(this.who===1?'P1':'P2',this.x+this.w/2,this.y+8);}
  }
}

class Switch {
  constructor(x,y,color,links=[]){this.x=x;this.y=y;this.w=36;this.h=20;this.color=color;this.links=links;this.active=false;this.wasPressed=false;}
  draw(){
    const ph=this.active?4:16;
    ctx.fillStyle='#444';ctx.fillRect(this.x-4,this.y-4,this.w+8,this.h+8);
    ctx.fillStyle=this.active?this.color:'#888';rRect(this.x+2,this.y+(this.active?12:2),this.w-4,ph,3);
    if(this.active){ctx.fillStyle=this.color+'66';ctx.beginPath();ctx.arc(this.x+this.w/2,this.y+4,10,0,Math.PI*2);ctx.fill();}
  }
}

class Door {
  constructor(x,y,hh,color,id){this.x=x;this.y=y;this.w=36;this.hh=hh;this.color=color;this.id=id;this.open=false;this.openT=0;}
  update(){if(this.open&&this.openT<1)this.openT=Math.min(1,this.openT+0.06);else if(!this.open&&this.openT>0)this.openT=Math.max(0,this.openT-0.06);}
  draw(){
    const gap=this.hh*this.openT;
    ctx.fillStyle='#555';ctx.fillRect(this.x-4,this.y-4,this.w+8,this.hh+8);
    ctx.fillStyle=this.color+'cc';ctx.fillRect(this.x,this.y,this.w,gap);ctx.fillRect(this.x,this.y+gap,this.w,this.hh-gap);
    ctx.strokeStyle='#333';ctx.lineWidth=2;
    for(let i=0;i<gap;i+=14){ctx.beginPath();ctx.moveTo(this.x,this.y+i);ctx.lineTo(this.x+this.w,this.y+i);ctx.stroke();}
    for(let i=gap;i<this.hh;i+=14){ctx.beginPath();ctx.moveTo(this.x,this.y+i);ctx.lineTo(this.x+this.w,this.y+i);ctx.stroke();}
  }
  collides(){return this.openT<0.95;}
}

class KeyItem {
  constructor(x,y,color,sz=28){this.x=x;this.y=y;this.color=color;this.sz=sz;this.collected=false;this.who=null;}
  draw(){
    if(this.collected)return;
    const t=Date.now()*0.003,by=Math.sin(t)*4;
    ctx.fillStyle=this.color+'44';ctx.beginPath();ctx.arc(this.x+this.sz/2,this.y+this.sz/2+by,this.sz,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x+this.sz/2,this.y+8+by,9,0,Math.PI*2);ctx.fill();
    ctx.fillRect(this.x+this.sz/2-3,this.y+14+by,6,16);ctx.fillRect(this.x+this.sz/2+3,this.y+24+by,6,3);ctx.fillRect(this.x+this.sz/2+3,this.y+19+by,5,3);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(this.x+this.sz/2,this.y+8+by,4,0,Math.PI*2);ctx.fill();
  }
}

class Lock {
  constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.p1Key=false;this.p2Key=false;this.opening=false;this.openCount=0;this.t=0;}
  get bothKeys(){return this.p1Key&&this.p2Key;}
  draw(){
    this.t+=0.05;const openAmt=this.opening?Math.min(1,this.openCount/60):(this.bothKeys?1:0);
    const gap=this.h*openAmt;
    ctx.fillStyle='#555';ctx.fillRect(this.x-4,this.y-4,this.w+8,this.h+8);
    ctx.fillStyle=openAmt>0.5?'#44cc66':'#cc4444';ctx.fillRect(this.x,this.y,this.w,gap);ctx.fillRect(this.x,this.y+gap,this.w,this.h-gap);
    if(openAmt<0.9){ctx.fillStyle='#ffcc00';ctx.font='bold 18px Arial';ctx.textAlign='center';ctx.fillText('🔒',this.x+this.w/2,this.y+this.h/2+6);}
  }
}

class ExitDoor {
  constructor(x,y,w,hh){this.x=x;this.y=y;this.w=w;this.hh=hh;}
  draw(){
    const pulse=0.5+Math.sin(Date.now()*0.004)*0.5;
    ctx.fillStyle='#2a1a00';ctx.beginPath();ctx.arc(this.x+this.w/2,this.y+this.hh,this.w/2,Math.PI,0);ctx.rect(this.x,this.y+this.hh/2,this.w,this.hh/2);ctx.fill();
    const g=ctx.createRadialGradient(this.x+this.w/2,this.y+this.hh/2,0,this.x+this.w/2,this.y+this.hh/2,this.w);
    g.addColorStop(0,`rgba(255,220,50,${0.5*pulse})`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(this.x-20,this.y-20,this.w+40,this.hh+40);
    ctx.strokeStyle='#ffcc00';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(this.x+this.w/2,this.y+this.hh,this.w/2-2,Math.PI,0);ctx.moveTo(this.x,this.y+this.hh/2);ctx.lineTo(this.x,this.y+this.hh);ctx.moveTo(this.x+this.w,this.y+this.hh/2);ctx.lineTo(this.x+this.w,this.y+this.hh);ctx.stroke();
    ctx.fillStyle='#ffcc00';ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.fillText('EXIT',this.x+this.w/2,this.y+this.hh/2+5);

// ─── PLAYER ───────────────────────────────────────────────
const P1K={left:'KeyA',right:'KeyD',up:'KeyW'}, P2K={left:'ArrowLeft',right:'ArrowRight',up:'ArrowUp'};

class Player {
  constructor(id,x,y,charDef){this.id=id;this.x=x;this.y=y;this.w=28;this.h=38;this.vx=0;this.vy=0;this.charDef=charDef;this.km=id===1?P1K:P2K;this.onGround=false;this.facing=1;this.hasKey=false;this.atExit=false;this.dead=false;this._stepped=false;}
  update(allPlats,plates,doors,switches,keyItems,exit,lock){
    const left=keys[this.km.left],right=keys[this.km.right],up=keys[this.km.up];
    if(left){this.vx=-SPD;this.facing=-1;}else if(right){this.vx=SPD;this.facing=1;}else this.vx*=0.7;
    if(up&&this.onGround){this.vy=JUMP;this.onGround=false;jumpSfx();}
    this.vy+=GRAV;this.x+=this.vx;this.y+=this.vy;
    if(this.x<0)this.x=0;if(this.x+this.w>W)this.x=W-this.w;
    this.onGround=false;
    allPlats.forEach(p=>{if(this.x+this.w>p.x&&this.x<p.x+p.w&&this.y+this.h>p.y&&this.y+this.h<p.y+p.h+12&&this.vy>=0){this.y=p.y-this.h;this.vy=0;this.onGround=true;}});
    if(this.y>H+80)this.dead=true;
    switches.forEach(sw=>{
      const cx=this.x+this.w/2,cy=this.y+this.h;
      const on=cx>sw.x&&cx<sw.x+sw.w&&cy>=sw.y-4&&cy<=sw.y+12&&this.onGround;
      if(on&&!sw.wasPressed){sw.active=!sw.active;sw.wasPressed=true;spawnPart(sw.x+sw.w/2,sw.y,sw.active?'#00ff88':'#ff6666',12);tone(sw.active?660:330,0.2,'sine',0.25);sw.links.forEach(lid=>{const d=doors.find(dd=>dd.id===lid);if(d)d.open=sw.active;});}
      if(!on)sw.wasPressed=false;
    });
    keyItems.forEach(k=>{if(!k.collected&&this.x+this.w>k.x&&this.x<k.x+k.sz&&this.y+this.h>k.y&&this.y<k.y+k.sz){k.collected=true;k.who=this.id;this.hasKey=true;coinSfx();spawnPart(k.x+k.sz/2,k.y+k.sz/2,this.charDef.color,15);}});
    if(lock&&lock.p1Key&&lock.p2Key){const cx=this.x+this.w/2,cy=this.y+this.h/2;if(cx>lock.x&&cx<lock.x+lock.w&&cy>lock.y&&cy<lock.y+lock.h){if(!lock.opening){lock.opening=true;lock.openCount=60;unlockSfx();}}}
    if(exit){const cx=this.x+this.w/2,cy=this.y+this.h/2;this.atExit=(cx>exit.x&&cx<exit.x+exit.w&&cy>exit.y&&cy<exit.y+exit.hh);}
  }
  draw(){
    if(this.dead)return;
    const bob=this.onGround&&Math.abs(this.vx)>0.5?Math.sin(Date.now()*0.02)*1.5:0;
    drawCharacter(this.charDef,this.x+this.w/2,this.y+this.h/2,0.85,this.id===1,bob,this.facing,true);
    if(this.hasKey){ctx.fillStyle='#ffcc00';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText('🔑',this.x+this.w/2,this.y-10);}
  }
}

// ─── LEVEL INIT ────────────────────────────────────────────
function initLevel(i){
  const d=LEVELS[i];
  lvl={bg:d.bg,name:d.name,hint:d.hint,p1start:d.p1start,p2start:d.p2start,
    platforms:d.platforms.map(p=>new Platform(p.x,p.y,p.w,p.h,p.style)),
    plates:d.plates.map(pl=>new Plate(pl.x,pl.y,pl.w,pl.color,pl.links)),
    switches:d.switches.map(sw=>new Switch(sw.x,sw.y,sw.color,sw.links)),
    doors:d.doors.map(dd=>new Door(dd.x,dd.y,dd.hh,dd.color,dd.id)),
    keys:d.keys.map(k=>new KeyItem(k.x,k.y,k.color,k.sz)),
    lock:d.lock?new Lock(d.lock.x,d.lock.y,d.lock.w,d.lock.h):null,
    exit:new ExitDoor(d.exit.x,d.exit.y,d.exit.w,d.exit.hh),
    box:d.box?{x:d.box.x,y:d.box.y,w:d.box.w,h:d.box.h,color:d.box.color,vy:0}:null};
  lockRef=lvl.lock;syncProgress=0;
  p1=new Player(1,lvl.p1start[0],lvl.p1start[1],p1Char);
  p2=new Player(2,lvl.p2start[0],lvl.p2start[1],p2Char);
  parts.length=0;
}

// ─── UPDATE ───────────────────────────────────────────────
function update(){
  if(gs!=='playing')return;
  if(lvl.box){
    const b=lvl.box;
    if(keys['KeyD']&&b.x+b.w<W-10)b.x+=3.5;
    if(keys['KeyA']&&b.x>10)b.x-=3.5;
    b.vy=(b.vy||0)+GRAV;b.y+=b.vy;
    if(b.y>=420-b.h){b.y=420-b.h;b.vy=0;}
    lvl.platforms.forEach(p=>{if(b.x+b.w>p.x&&b.x<p.x+p.w&&b.y+b.h>p.y&&b.y+b.h<p.y+p.h+12&&b.vy>=0){b.y=p.y-b.h;b.vy=0;}});
  }
  lvl.plates.forEach(pl=>{
    pl.who=null;
    const cx1=p1.x+p1.w/2,cy1=p1.y+p1.h,cx2=p2.x+p2.w/2,cy2=p2.y+p2.h;
    const p1on=cx1>pl.x&&cx1<pl.x+pl.w&&cy1>=pl.y-4&&cy1<=pl.y+12&&p1.onGround;
    const p2on=cx2>pl.x&&cx2<pl.x+pl.w&&cy2>=pl.y-4&&cy2<=pl.y+12&&p2.onGround;
    if(p1on){pl.who=1;if(keys['KeyW']&&!p1._stepped){stepSfx();p1._stepped=true;}}
    if(p2on){pl.who=2;if(keys['ArrowUp']&&!p2._stepped){stepSfx();p2._stepped=true;}}
    if(!p1on&&!p2on){p1._stepped=false;p2._stepped=false;}
    pl.links.forEach(lid=>{const dd=lvl.doors.find(ddd=>ddd.id===lid);if(dd)dd.open=pl.who!==null;});
  });
  lvl.doors.forEach(dd=>{
    dd.update();
    if(dd.collides()){[p1,p2].forEach(p=>{if(p.x+p.w>dd.x&&p.x<dd.x+dd.w&&p.y+p.h>dd.y&&p.y<dd.y+dd.hh){p.x=p.x<dd.x+dd.w/2?dd.x-p.w:dd.x+dd.w;}});}
  });
  if(lvl.lock){lvl.lock.p1Key=p1.hasKey;lvl.lock.p2Key=p2.hasKey;if(lvl.lock.opening){lvl.lock.openCount--;if(lvl.lock.openCount<=0)lvl.doors.forEach(dd=>dd.open=true);}}
  const allPlats=lvl.box?[...lvl.platforms,lvl.box]:lvl.platforms;
  p1.update(allPlats,lvl.plates,lvl.doors,lvl.switches,lvl.keys,lvl.exit,lvl.lock);
  p2.update(allPlats,lvl.plates,lvl.doors,lvl.switches,lvl.keys,lvl.exit,lvl.lock);
  if(lvlIdx===3){
    const both=lvl.plates.every(pl=>pl.who!==null);
    if(both){syncProgress++;if(syncProgress===60){syncSfx();spawnPart(450,220,'#ffcc00',25);}}
    else syncProgress=Math.max(0,syncProgress-2);
    if(syncProgress>=60)lvl.doors.forEach(dd=>{if(dd.id==='sync_gate')dd.open=true;});
  }
  updateParts();
  if(p1.dead||p2.dead)loseSfx();
  if(p1.atExit&&p2.atExit){winSfx();gs='levelComplete';}
}

// ─── MAIN DRAW ─────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  if(gs==='charSelect'){drawCharSelect();return;}
  if(gs==='menu'){drawMenu();return;}
  if(gs==='levelComplete'){drawBG();lvl.platforms.forEach(p=>p.draw());p1.draw();p2.draw();drawLevelComplete();return;}
  if(gs==='gameWin'){drawGameWin();return;}
  drawBG();
  if(lvl.box){const b=lvl.box;ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.fillStyle='#d4a060';ctx.fillRect(b.x+4,b.y+4,b.w-8,b.h-8);ctx.strokeStyle='#8a6030';ctx.lineWidth=2;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.fillStyle='#8a6030';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText('📦',b.x+b.w/2,b.y+b.h/2+5);ctx.fillStyle='#aaa';ctx.font='10px Arial';ctx.fillText('P1 ← →',b.x+b.w/2,b.y+b.h-4);}
  lvl.platforms.forEach(p=>p.draw());
  lvl.plates.forEach(pl=>pl.draw());
  lvl.switches.forEach(sw=>sw.draw());
  lvl.doors.forEach(dd=>dd.draw());
  if(lvl.lock)lvl.lock.draw();
  lvl.keys.forEach(k=>k.draw());
  if(lvl.exit)lvl.exit.draw();
  drawParts();
  if(!p1.dead)p1.draw();
  if(!p2.dead)p2.draw();
  drawUI();
  if(p1.dead||p2.dead){ctx.fillStyle='rgba(200,0,0,0.3)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='bold 36px Arial';ctx.textAlign='center';ctx.fillText('💀 One down! Press R to retry',W/2,H/2);}
}

// ─── CLICK ────────────────────────────────────────────────
C.addEventListener('click',e=>{
  const rect=C.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);
  if(gs==='charSelect'){
    const ccols=4,crows=2,cw=100,ch=115,cg=16,gridW=ccols*cw+(ccols-1)*cg,gridH=crows*ch+(crows-1)*cg,gx=W/2-gridW/2,gy=155;
    for(let i=0;i<CHARACTERS.length;i++){
      const col=i%ccols,row=Math.floor(i/ccols),cx=gx+col*(cw+cg)+cw/2,cy=gy+row*(ch+cg)+ch/2;
      const dx=mx-cx,dy=my-cy;if(Math.sqrt(dx*dx+dy*dy)<=cw/2){pickSfx();if(charPhase===0)pickP1=i;else pickP2=i;return;}
    }
    if(my>390&&my<490&&mx>W/2-120&&mx<W/2+120){
      if(charPhase===0){pickSfx();charPhase=1;}
      else{pickSfx();p1Char=CHARACTERS[pickP1];p2Char=CHARACTERS[pickP2];gs='menu';}
    }
    return;
  }
  if(gs==='menu'){if(mx>W/2-110&&mx<W/2+110&&my>480&&my<534){selectSfx();gs='playing';initLevel(0);}return;}
  if(gs==='levelComplete'){selectSfx();if(lvlIdx<LEVELS.length-1){lvlIdx++;initLevel(lvlIdx);gs='playing';}else gs='gameWin';return;}
  if(gs==='gameWin'){selectSfx();gs='charSelect';charPhase=0;pickP1=0;pickP2=0;}
});

// ─── LOOP ─────────────────────────────────────────────────
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
